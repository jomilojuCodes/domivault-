<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages — Domivault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a1628;--navy-mid:#132040;--navy-light:#1c2f52;
  --gold:#BA7517;--gold-light:#EF9F27;--cream:#f8f5ee;
  --stone:#888780;--white:#fff;--success:#2ecc71;--error:#e05252;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
  --r:12px;--rs:8px;--t:.25s ease;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--navy);color:var(--white);}

/* ── NAV ── */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:.9rem 5%;background:rgba(10,22,40,.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(186,117,23,.15);flex-shrink:0;height:65px;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo svg{width:26px;height:30px;flex-shrink:0;}
.nav-wordmark{font-family:var(--serif);font-size:1.25rem;font-weight:700;color:var(--white);}
.nav-wordmark span{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.iBtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);position:relative;}
.iBtn svg{width:17px;height:17px;}
.nBadge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--navy);}
.navAvatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--navy-light));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--navy);cursor:pointer;border:2px solid rgba(186,117,23,.3);}

/* ── MAIN LAYOUT ── */
.app-shell{display:flex;height:calc(100vh - 65px);}

/* ── SIDEBAR NAV (desktop) ── */
.side-nav{display:none;width:72px;background:var(--navy-mid);border-right:1px solid rgba(186,117,23,.1);flex-direction:column;align-items:center;padding:1rem 0;gap:6px;flex-shrink:0;}
.snav-btn{width:44px;height:44px;border-radius:var(--rs);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:rgba(255,255,255,.3);background:none;border:none;transition:all .2s;position:relative;}
.snav-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);}
.snav-btn.active{background:rgba(186,117,23,.12);color:var(--gold);}
.snav-btn svg{width:20px;height:20px;}
.snav-btn span{font-size:9px;font-weight:500;}
.snav-badge{position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── CONVERSATIONS PANEL ── */
.conv-panel{width:100%;max-width:380px;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;flex-shrink:0;background:var(--navy);}
.conv-header{padding:1.25rem 1.25rem .75rem;flex-shrink:0;}
.conv-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;margin-bottom:.85rem;}
.conv-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);padding:.65rem .9rem;margin-bottom:.75rem;}
.conv-search:focus-within{border-color:rgba(186,117,23,.4);}
.conv-search svg{width:15px;height:15px;color:rgba(255,255,255,.3);flex-shrink:0;}
.conv-search input{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:13px;font-family:var(--sans);}
.conv-search input::placeholder{color:rgba(255,255,255,.25);}
.conv-tabs{display:flex;gap:4px;margin-bottom:.5rem;}
.ctab{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.ctab.active{background:rgba(186,117,23,.15);border-color:rgba(186,117,23,.3);color:var(--gold-light);}
.ctab-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--gold);color:var(--navy);border-radius:50%;font-size:9px;font-weight:700;margin-left:4px;}
.conv-list{flex:1;overflow-y:auto;}
.conv-list::-webkit-scrollbar{width:0;}

/* CONVERSATION ITEM */
.conv-item{display:flex;align-items:center;gap:12px;padding:1rem 1.25rem;cursor:pointer;transition:background .2s;border-bottom:1px solid rgba(255,255,255,.04);position:relative;}
.conv-item:hover{background:rgba(255,255,255,.03);}
.conv-item.active{background:rgba(186,117,23,.07);border-left:3px solid var(--gold);}
.conv-item.unread{background:rgba(186,117,23,.04);}
.conv-av-wrap{position:relative;flex-shrink:0;}
.conv-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--navy-light));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--navy);}
.conv-online{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;background:var(--success);border:2px solid var(--navy);}
.conv-body{flex:1;min-width:0;}
.conv-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.conv-item.unread .conv-name{font-weight:600;}
.conv-prop{font-size:11px;color:var(--gold);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-preview{font-size:12px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-item.unread .conv-preview{color:rgba(255,255,255,.65);}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.conv-time{font-size:10px;color:rgba(255,255,255,.28);}
.conv-unread-cnt{width:18px;height:18px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── CHAT PANEL ── */
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}

/* CHAT HEADER */
.chat-header{display:flex;align-items:center;gap:12px;padding:.85rem 1.25rem;background:rgba(10,22,40,.97);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.chat-back{display:none;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;padding:4px;margin-right:4px;}
.chat-back svg{width:20px;height:20px;}
.chat-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--navy-light));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--navy);flex-shrink:0;position:relative;}
.chat-av-online{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--success);border:2px solid var(--navy);}
.chat-header-info{flex:1;min-width:0;}
.chat-name{font-size:14px;font-weight:600;margin-bottom:1px;}
.chat-status{font-size:11px;color:var(--success);}
.chat-status.away{color:rgba(255,255,255,.35);}
.chat-header-actions{display:flex;gap:8px;}
.chat-action{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.6);transition:all .2s;}
.chat-action:hover{background:rgba(186,117,23,.15);color:var(--gold);}
.chat-action svg{width:16px;height:16px;}

/* PROPERTY PREVIEW */
.prop-preview{display:flex;align-items:center;gap:10px;padding:.75rem 1.25rem;background:rgba(186,117,23,.05);border-bottom:1px solid rgba(186,117,23,.12);cursor:pointer;transition:background .2s;flex-shrink:0;}
.prop-preview:hover{background:rgba(186,117,23,.09);}
.prop-prev-img{width:44px;height:44px;border-radius:var(--rs);overflow:hidden;flex-shrink:0;}
.prop-prev-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.85);}
.prop-prev-name{font-size:12px;font-weight:500;margin-bottom:1px;}
.prop-prev-loc{font-size:10px;color:rgba(255,255,255,.4);}
.prop-prev-price{font-size:12px;color:var(--gold);font-weight:600;margin-top:2px;}
.prop-prev-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);color:var(--success);font-size:9px;font-weight:600;padding:2px 6px;border-radius:100px;margin-left:auto;flex-shrink:0;}

/* MESSAGES */
.messages-wrap{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;}
.messages-wrap::-webkit-scrollbar{width:4px;}
.messages-wrap::-webkit-scrollbar-track{background:transparent;}
.messages-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

.msg-date{text-align:center;margin:.5rem 0;}
.msg-date span{font-size:11px;color:rgba(255,255,255,.28);background:rgba(255,255,255,.05);padding:4px 12px;border-radius:100px;}

.msg-row{display:flex;align-items:flex-end;gap:8px;}
.msg-row.sent{flex-direction:row-reverse;}
.msg-av-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--navy-light));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:.75rem;font-weight:700;color:var(--navy);flex-shrink:0;}
.msg-av-sm.tenant{background:linear-gradient(135deg,#185FA5,var(--navy-light));}

.msg-bubble{max-width:72%;padding:.75rem 1rem;border-radius:var(--r);font-size:13px;line-height:1.6;position:relative;}
.msg-bubble.received{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:4px;color:rgba(255,255,255,.85);}
.msg-bubble.sent{background:var(--gold);color:var(--navy);border-bottom-right-radius:4px;font-weight:500;}
.msg-time{font-size:10px;margin-top:4px;display:flex;align-items:center;gap:4px;}
.msg-bubble.received .msg-time{color:rgba(255,255,255,.28);}
.msg-bubble.sent .msg-time{color:rgba(10,22,40,.5);}
.msg-read{display:flex;gap:1px;}
.msg-read svg{width:10px;height:10px;}

.msg-bubble.img-bubble{padding:0;overflow:hidden;background:none;border:none;}
.msg-bubble.img-bubble img{width:200px;height:150px;object-fit:cover;border-radius:var(--r);display:block;}

/* TYPING INDICATOR */
.typing-indicator{display:flex;align-items:center;gap:8px;}
.typing-dots{display:flex;gap:4px;padding:.6rem .9rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);border-bottom-left-radius:4px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);animation:typingBounce 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* QUICK REPLIES */
.quick-replies{display:flex;gap:6px;overflow-x:auto;padding:.75rem 1.25rem .5rem;flex-shrink:0;scrollbar-width:none;}
.quick-replies::-webkit-scrollbar{display:none;}
.qr{background:rgba(255,255,255,.05);border:1px solid rgba(186,117,23,.2);color:rgba(255,255,255,.65);border-radius:100px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--sans);transition:all .2s;flex-shrink:0;}
.qr:hover{background:rgba(186,117,23,.12);border-color:rgba(186,117,23,.4);color:var(--gold-light);}

/* MESSAGE INPUT */
.msg-input-wrap{display:flex;align-items:flex-end;gap:8px;padding:.85rem 1.25rem;background:rgba(10,22,40,.97);border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.msg-input-box{flex:1;display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:.6rem .9rem;transition:border-color .2s;}
.msg-input-box:focus-within{border-color:rgba(186,117,23,.4);}
.msg-input{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:14px;font-family:var(--sans);resize:none;max-height:100px;line-height:1.5;}
.msg-input::placeholder{color:rgba(255,255,255,.28);}
.msg-emoji{background:none;border:none;cursor:pointer;font-size:1.1rem;color:rgba(255,255,255,.35);padding:2px;transition:color .2s;}
.msg-emoji:hover{color:rgba(255,255,255,.7);}
.msg-attach{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);padding:2px;transition:color .2s;}
.msg-attach:hover{color:rgba(255,255,255,.7);}
.msg-attach svg{width:18px;height:18px;}
.msg-send{width:40px;height:40px;border-radius:50%;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s,transform .15s;}
.msg-send:hover{background:var(--gold-light);}
.msg-send:active{transform:scale(.95);}
.msg-send svg{width:18px;height:18px;color:var(--navy);}

/* EMPTY STATE */
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.ce-icon{font-size:3.5rem;margin-bottom:1rem;}
.ce-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;margin-bottom:.5rem;}
.ce-sub{font-size:13px;color:rgba(255,255,255,.35);line-height:1.65;max-width:280px;}

/* SCHEDULE CTA */
.schedule-cta{display:flex;align-items:center;justify-content:center;gap:8px;margin:.25rem 1.25rem;padding:.7rem;background:rgba(186,117,23,.07);border:1px solid rgba(186,117,23,.18);border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--gold-light);font-weight:500;transition:background .2s;flex-shrink:0;}
.schedule-cta:hover{background:rgba(186,117,23,.12);}
.schedule-cta svg{width:15px;height:15px;}

/* BOTTOM NAV */
.bottom-nav{display:flex;justify-content:space-around;padding:.7rem 0 1rem;background:rgba(10,22,40,.97);backdrop-filter:blur(14px);border-top:1px solid rgba(186,117,23,.15);flex-shrink:0;}
.bnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:rgba(255,255,255,.3);font-family:var(--sans);transition:color .2s;position:relative;}
.bnav-btn.active{color:var(--gold);}
.bnav-btn svg{width:20px;height:20px;}
.bnav-btn span{font-size:10px;font-weight:500;}
.bnav-badge{position:absolute;top:-3px;right:-4px;width:15px;height:15px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--navy);}

/* RESPONSIVE */
@media(min-width:768px){
  .side-nav{display:flex;}
  .chat-back{display:none!important;}
  .conv-panel{display:flex!important;}
  .chat-panel{display:flex!important;}
  .bottom-nav{display:none;}
}
@media(max-width:767px){
  .conv-panel{max-width:100%;}
  .chat-panel.mobile-hidden{display:none;}
  .conv-panel.mobile-hidden{display:none;}
  .chat-back{display:flex!important;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <a class="nav-logo" href="domivault-homepage.html">
    <svg viewBox="0 0 34 38" fill="none">
      <polygon points="17,1 33,12 33,37 1,37 1,12" fill="white"/>
      <circle cx="17" cy="25" r="8" fill="none" stroke="#BA7517" stroke-width="2.1"/>
      <circle cx="17" cy="25" r="3" fill="#BA7517"/>
      <line x1="17" y1="17" x2="17" y2="20" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="17" y1="30" x2="17" y2="33" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="9" y1="25" x2="12" y2="25" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22" y1="25" x2="25" y2="25" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="17" y1="1" x2="1" y2="12" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="17" y1="1" x2="33" y2="12" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <div class="nav-wordmark">Domi<span>vault</span></div>
  </a>
  <div class="nav-right">
    <button class="iBtn" aria-label="Notifications" onclick="window.location='domivault-notifications.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="nBadge">3</div>
    </button>
    <div class="navAvatar" onclick="window.location='domivault-tenant-profile.html'">J</div>
  </div>
</nav>

<div class="app-shell">

  <!-- SIDEBAR NAV -->
  <nav class="side-nav">
    <button class="snav-btn" onclick="window.location='domivault-homepage.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Home</span>
    </button>
    <button class="snav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="snav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Saved</span>
    </button>
    <button class="snav-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Messages</span>
      <div class="snav-badge">2</div>
    </button>
    <button class="snav-btn" onclick="window.location='domivault-tenant-profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </button>
  </nav>

  <!-- CONVERSATIONS PANEL -->
  <div class="conv-panel" id="convPanel">
    <div class="conv-header">
      <div class="conv-title">Messages</div>
      <div class="conv-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search conversations..." oninput="filterConvs(this.value)"/>
      </div>
      <div class="conv-tabs">
        <button class="ctab active" onclick="setConvTab(this,'all')">All <span class="ctab-badge">4</span></button>
        <button class="ctab" onclick="setConvTab(this,'unread')">Unread <span class="ctab-badge">2</span></button>
        <button class="ctab" onclick="setConvTab(this,'archived')">Archived</button>
      </div>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel mobile-hidden" id="chatPanel">

    <!-- CHAT HEADER -->
    <div class="chat-header" id="chatHeader">
      <button class="chat-back" onclick="showConvList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="chat-av" id="chatAv">A<div class="chat-av-online"></div></div>
      <div class="chat-header-info">
        <div class="chat-name" id="chatName">Mr Adeyemi Oluwaseun</div>
        <div class="chat-status" id="chatStatus">Online now</div>
      </div>
      <div class="chat-header-actions">
        <button class="chat-action" title="Call landlord">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.92 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 5.61 5.61l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </button>
        <button class="chat-action" title="View listing" onclick="window.location='domivault-listing-detail.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <button class="chat-action" title="More options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
    </div>

    <!-- PROPERTY PREVIEW -->
    <div class="prop-preview" onclick="window.location='domivault-listing-detail.html'" id="propPreview">
      <div class="prop-prev-img"><img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=200&q=70" alt="Property" id="propImg"/></div>
      <div>
        <div class="prop-prev-name" id="propName">Modern 4-Bed Apartment</div>
        <div class="prop-prev-loc" id="propLoc">📍 Lekki Phase 1, Lagos</div>
        <div class="prop-prev-price" id="propPrice">₦3,500,000/yr</div>
      </div>
      <div class="prop-prev-badge">✓ Verified</div>
    </div>

    <!-- MESSAGES -->
    <div class="messages-wrap" id="messagesWrap"></div>

    <!-- TYPING INDICATOR -->
    <div id="typingWrap" style="padding:0 1.25rem .5rem;display:none;">
      <div class="typing-indicator">
        <div class="msg-av-sm">A</div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <!-- SCHEDULE CTA -->
    <div class="schedule-cta" id="scheduleCta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Schedule a viewing for this property
    </div>

    <!-- QUICK REPLIES -->
    <div class="quick-replies" id="quickReplies">
      <button class="qr" onclick="sendQuickReply(this)">Is it still available?</button>
      <button class="qr" onclick="sendQuickReply(this)">Can I schedule a viewing?</button>
      <button class="qr" onclick="sendQuickReply(this)">What's included in the rent?</button>
      <button class="qr" onclick="sendQuickReply(this)">Is the price negotiable?</button>
      <button class="qr" onclick="sendQuickReply(this)">When is it available?</button>
    </div>

    <!-- INPUT -->
    <div class="msg-input-wrap">
      <div class="msg-input-box">
        <button class="msg-emoji">😊</button>
        <textarea class="msg-input" id="msgInput" placeholder="Type a message..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="msg-attach">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
      </div>
      <button class="msg-send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-btn" onclick="window.location='domivault-homepage.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </button>
  <button class="bnav-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="bnav-btn" onclick="window.location='domivault-saved-listings.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    <span>Saved</span>
  </button>
  <button class="bnav-btn active" style="position:relative;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <div class="bnav-badge">2</div>
    <span>Messages</span>
  </button>
  <button class="bnav-btn" onclick="window.location='domivault-tenant-profile.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </button>
</nav>

<script>
// ── DATA ──
const CONVERSATIONS = [
  {
    id:1, name:'Mr Adeyemi Oluwaseun', init:'A',
    prop:'Modern 4-Bed Apartment', loc:'Lekki Phase 1', price:'₦3,500,000/yr',
    img:'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=200&q=70',
    last:'Yes, the apartment is still available. When would you like to schedule a viewing?',
    time:'2m ago', unread:2, online:true,
    color:'linear-gradient(135deg,#BA7517,#1c2f52)',
    messages:[
      {id:1,type:'received',text:'Hello! I saw your listing on Domivault. Is the 4-bedroom apartment in Lekki still available?',time:'10:14 AM',read:true},
      {id:2,type:'sent',text:'Yes, the apartment is still available! It was inspected and verified by Domivault last month.',time:'10:16 AM',read:true},
      {id:3,type:'received',text:'That\'s great! What\'s included in the annual rent? Is the service charge separate?',time:'10:18 AM',read:true},
      {id:4,type:'sent',text:'The annual rent is ₦3,500,000. Service charge of ₦400,000 is separate. The apartment comes with 24hr power, security, and a swimming pool.',time:'10:21 AM',read:true},
      {id:5,type:'received',text:'Sounds good. Can we schedule a viewing this week? I\'m available Thursday or Friday morning.',time:'10:45 AM',read:true},
      {id:6,type:'sent',text:'Thursday works for me. Let\'s say 10 AM at the property? I\'ll send you the exact address.',time:'11:02 AM',read:true},
      {id:7,type:'received',text:'Perfect! I\'ll be there. Is there parking available on site?',time:'11:05 AM',read:false},
      {id:8,type:'received',text:'Also — is the price negotiable at all?',time:'11:06 AM',read:false},
    ]
  },
  {
    id:2, name:'Mrs Okafor', init:'O',
    prop:'Luxury 5-Bed Detached', loc:'Ikoyi, Lagos', price:'₦12,000,000/yr',
    img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=200&q=70',
    last:'The property is available from the 1st of February. Let me know if that works.',
    time:'Yesterday', unread:0, online:false,
    color:'linear-gradient(135deg,#0F6E56,#1c2f52)',
    messages:[
      {id:1,type:'received',text:'Good afternoon! Thank you for your enquiry about the Ikoyi property.',time:'2:00 PM',read:true},
      {id:2,type:'sent',text:'Good afternoon Mrs Okafor. I\'m very interested in the 5-bedroom. Is it available for immediate occupancy?',time:'2:05 PM',read:true},
      {id:3,type:'received',text:'The property is available from the 1st of February. Let me know if that works for you and we can arrange a viewing.',time:'2:15 PM',read:true},
    ]
  },
  {
    id:3, name:'Mr Bello', init:'B',
    prop:'Contemporary 3-Bed Flat', loc:'Victoria Island', price:'₦5,200,000/yr',
    img:'https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=200&q=70',
    last:'Thank you for viewing the property. Hope to hear from you soon!',
    time:'Mon', unread:0, online:false,
    color:'linear-gradient(135deg,#185FA5,#1c2f52)',
    messages:[
      {id:1,type:'sent',text:'Hi Mr Bello, I came for the viewing today. The flat looks great!',time:'4:00 PM',read:true},
      {id:2,type:'received',text:'Thank you for coming! I\'m glad you liked it. Please let me know if you have any questions.',time:'4:30 PM',read:true},
      {id:3,type:'received',text:'Thank you for viewing the property. Hope to hear from you soon!',time:'4:31 PM',read:true},
    ]
  },
  {
    id:4, name:'Mrs Ibrahim', init:'I',
    prop:'Spacious 5-Bed House', loc:'Ajah, Lagos', price:'₦8,000,000/yr',
    img:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=200&q=70',
    last:'Please send your documents when you\'re ready to proceed.',
    time:'Sun', unread:0, online:false,
    color:'linear-gradient(135deg,#854F0B,#1c2f52)',
    messages:[
      {id:1,type:'sent',text:'Good evening Mrs Ibrahim. I\'m interested in the Ajah property.',time:'6:00 PM',read:true},
      {id:2,type:'received',text:'Hello! Yes the property is available. Please send your documents when you\'re ready to proceed.',time:'6:45 PM',read:true},
    ]
  }
];

let activeConvId = 1;
let convTab = 'all';
let searchQuery = '';

// ── RENDER CONVERSATIONS ──
function renderConvList() {
  const list = document.getElementById('convList');
  let convs = CONVERSATIONS;
  if (convTab === 'unread') convs = convs.filter(c => c.unread > 0);
  if (searchQuery) convs = convs.filter(c => c.name.toLowerCase().includes(searchQuery) || c.prop.toLowerCase().includes(searchQuery));

  if (convs.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:rgba(255,255,255,.3);font-size:13px;">No conversations found</div>`;
    return;
  }

  list.innerHTML = convs.map(c => `
    <div class="conv-item ${c.unread > 0 ? 'unread' : ''} ${c.id === activeConvId ? 'active' : ''}" onclick="openConv(${c.id})">
      <div class="conv-av-wrap">
        <div class="conv-av" style="background:${c.color};">${c.init}</div>
        ${c.online ? '<div class="conv-online"></div>' : ''}
      </div>
      <div class="conv-body">
        <div class="conv-name">${c.name}</div>
        <div class="conv-prop">${c.prop}</div>
        <div class="conv-preview">${c.last}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${c.time}</div>
        ${c.unread > 0 ? `<div class="conv-unread-cnt">${c.unread}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ── RENDER MESSAGES ──
function renderMessages(convId) {
  const conv = CONVERSATIONS.find(c => c.id === convId);
  if (!conv) return;

  // Update header
  document.getElementById('chatAv').innerHTML = conv.init + (conv.online ? '<div class="chat-av-online"></div>' : '');
  document.getElementById('chatAv').style.background = conv.color;
  document.getElementById('chatName').textContent = conv.name;
  document.getElementById('chatStatus').textContent = conv.online ? 'Online now' : 'Last seen recently';
  document.getElementById('chatStatus').className = 'chat-status ' + (conv.online ? '' : 'away');

  // Update property preview
  document.getElementById('propName').textContent = conv.prop;
  document.getElementById('propLoc').textContent = '📍 ' + conv.loc;
  document.getElementById('propPrice').textContent = conv.price;
  document.getElementById('propImg').src = conv.img;

  // Render messages
  const wrap = document.getElementById('messagesWrap');
  const groups = groupByDate(conv.messages);

  wrap.innerHTML = groups.map(group => `
    <div class="msg-date"><span>${group.date}</span></div>
    ${group.msgs.map(m => `
      <div class="msg-row ${m.type}">
        ${m.type === 'received' ? `<div class="msg-av-sm" style="background:${conv.color};">${conv.init}</div>` : ''}
        <div class="msg-bubble ${m.type}">
          ${m.text}
          <div class="msg-time">
            ${m.time}
            ${m.type === 'sent' ? `<div class="msg-read">
              <svg viewBox="0 0 24 24" fill="none" stroke="${m.read ? '#BA7517' : 'rgba(10,22,40,0.5)'}" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="${m.read ? '#BA7517' : 'rgba(10,22,40,0.5)'}" stroke-width="2.5" stroke-linecap="round" style="margin-left:-6px;"><polyline points="20 6 9 17 4 12"/></svg>
            </div>` : ''}
          </div>
        </div>
        ${m.type === 'sent' ? `<div class="msg-av-sm tenant">J</div>` : ''}
      </div>
    `).join('')}
  `).join('');

  // Show typing if online
  if (conv.online) {
    setTimeout(() => {
      document.getElementById('typingWrap').style.display = 'block';
      wrap.scrollTop = wrap.scrollHeight;
    }, 800);
  } else {
    document.getElementById('typingWrap').style.display = 'none';
  }

  wrap.scrollTop = wrap.scrollHeight;

  // Mark as read
  conv.unread = 0;
  renderConvList();
}

function groupByDate(messages) {
  return [{ date: 'Today', msgs: messages }];
}

function openConv(id) {
  activeConvId = id;
  renderMessages(id);
  renderConvList();
  if (window.innerWidth < 768) {
    document.getElementById('convPanel').classList.add('mobile-hidden');
    document.getElementById('chatPanel').classList.remove('mobile-hidden');
    document.getElementById('bottomNav').style.display = 'none';
  }
}

function showConvList() {
  document.getElementById('convPanel').classList.remove('mobile-hidden');
  document.getElementById('chatPanel').classList.add('mobile-hidden');
  document.getElementById('bottomNav').style.display = 'flex';
}

function setConvTab(btn, tab) {
  document.querySelectorAll('.ctab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  convTab = tab;
  renderConvList();
}

function filterConvs(q) {
  searchQuery = q.toLowerCase();
  renderConvList();
}

// ── SEND MESSAGE ──
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const conv = CONVERSATIONS.find(c => c.id === activeConvId);
  const newMsg = { id: Date.now(), type:'sent', text, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), read:false };
  conv.messages.push(newMsg);
  conv.last = text;
  conv.time = 'Just now';

  input.value = '';
  input.style.height = 'auto';
  renderMessages(activeConvId);
  renderConvList();

  // Simulate reply after 1.5s
  if (conv.online) {
    setTimeout(() => {
      document.getElementById('typingWrap').style.display = 'block';
      document.getElementById('messagesWrap').scrollTop = document.getElementById('messagesWrap').scrollHeight;
      setTimeout(() => {
        document.getElementById('typingWrap').style.display = 'none';
        const replies = [
          'Yes of course! Let me know what time works for you.',
          'That sounds great. I\'ll prepare the documents.',
          'The price is as stated but we can discuss on viewing.',
          'Parking is included — 2 spaces for this unit.'
        ];
        const reply = { id: Date.now(), type:'received', text: replies[Math.floor(Math.random()*replies.length)], time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), read:false };
        conv.messages.push(reply);
        conv.last = reply.text;
        renderMessages(activeConvId);
        renderConvList();
      }, 2000);
    }, 500);
  }
}

function sendQuickReply(btn) {
  document.getElementById('msgInput').value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── INIT ──
renderConvList();
renderMessages(activeConvId);
</script>
</body>
</html>
