<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notifications — Domivault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a1628;--navy-mid:#132040;--navy-light:#1c2f52;
  --gold:#BA7517;--gold-light:#EF9F27;
  --stone:#888780;--white:#fff;--success:#2ecc71;--error:#e05252;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
  --r:12px;--rs:8px;--t:.25s ease;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--navy);color:var(--white);overflow-x:hidden;padding-bottom:80px;}

/* NAV */
.topnav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 5%;background:rgba(10,22,40,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(186,117,23,.15);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo svg{width:26px;height:30px;flex-shrink:0;}
.nav-wordmark{font-family:var(--serif);font-size:1.25rem;font-weight:700;color:var(--white);}
.nav-wordmark span{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.navAvatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--navy-light));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--navy);cursor:pointer;border:2px solid rgba(186,117,23,.3);}
.mark-all{background:none;border:none;color:var(--gold);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);}

/* LAYOUT */
.main-layout{display:flex;max-width:860px;margin:0 auto;}
.content{flex:1;min-width:0;}

/* TABS */
.tabs-wrap{position:sticky;top:65px;z-index:90;background:rgba(10,22,40,.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.07);padding:0 5%;}
.tabs{display:flex;gap:0;}
.tab{background:none;border:none;color:rgba(255,255,255,.35);border-bottom:2px solid transparent;padding:.75rem 1rem;font-size:13px;cursor:pointer;font-family:var(--sans);transition:all .2s;margin-bottom:-1px;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600;}
.tab-badge{background:var(--gold);color:var(--navy);font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;}

/* NOTIFICATIONS */
.notif-list{padding:0;}
.date-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);padding:.85rem 5% .4rem;}

.notif-item{display:flex;align-items:flex-start;gap:12px;padding:1rem 5%;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .2s;position:relative;}
.notif-item:hover{background:rgba(255,255,255,.02);}
.notif-item.unread{background:rgba(186,117,23,.04);}
.notif-item.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0;}

.notif-icon-wrap{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.ni-msg{background:rgba(24,95,165,.2);}
.ni-listing{background:rgba(186,117,23,.15);}
.ni-viewing{background:rgba(186,117,23,.15);}
.ni-check{background:rgba(46,204,113,.15);}
.ni-price{background:rgba(46,204,113,.15);}
.ni-warning{background:rgba(224,82,82,.15);}
.ni-system{background:rgba(255,255,255,.08);}
.ni-referral{background:rgba(186,117,23,.15);}

.notif-body{flex:1;min-width:0;}
.notif-title{font-size:13px;font-weight:500;margin-bottom:3px;line-height:1.4;}
.notif-item.unread .notif-title{font-weight:600;}
.notif-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:5px;}
.notif-time{font-size:10px;color:rgba(255,255,255,.25);}
.notif-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.notif-prop{font-size:11px;color:var(--gold);font-weight:500;}

.notif-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}

/* NOTIF ACTIONS */
.notif-actions{display:flex;gap:6px;margin-top:8px;}
.na-btn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:100px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.na-primary{background:var(--gold);color:var(--navy);border:none;}
.na-primary:hover{background:var(--gold-light);}
.na-secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.1);}
.na-secondary:hover{background:rgba(255,255,255,.1);color:var(--white);}

/* PROPERTY PREVIEW IN NOTIF */
.notif-prop-preview{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:var(--rs);padding:.6rem .75rem;margin-top:6px;cursor:pointer;}
.notif-prop-preview:hover{border-color:rgba(186,117,23,.3);}
.npp-img{width:36px;height:36px;border-radius:6px;overflow:hidden;flex-shrink:0;}
.npp-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.85);}
.npp-name{font-size:12px;font-weight:500;margin-bottom:1px;}
.npp-price{font-size:11px;color:var(--gold);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:5rem 2rem;}
.ei{font-size:3.5rem;margin-bottom:1rem;}
.et{font-family:var(--serif);font-size:1.3rem;font-weight:700;margin-bottom:.5rem;}
.es{font-size:13px;color:rgba(255,255,255,.35);line-height:1.65;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;padding:.7rem 0 1rem;background:rgba(10,22,40,.97);backdrop-filter:blur(14px);border-top:1px solid rgba(186,117,23,.15);}
.bnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:rgba(255,255,255,.3);font-family:var(--sans);transition:color .2s;position:relative;}
.bnav-btn.active{color:var(--gold);}
.bnav-btn svg{width:20px;height:20px;}
.bnav-btn span{font-size:10px;font-weight:500;}
.bnav-badge{position:absolute;top:-3px;right:-4px;width:15px;height:15px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--navy);}

@media(min-width:860px){body{padding-bottom:0;}.bottom-nav{display:none;}.content{padding:0;}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <a class="nav-logo" id="logoLink" href="domivault-homepage.html">
    <svg viewBox="0 0 34 38" fill="none">
      <polygon points="17,1 33,12 33,37 1,37 1,12" fill="white"/>
      <circle cx="17" cy="25" r="8" fill="none" stroke="#BA7517" stroke-width="2.1"/>
      <circle cx="17" cy="25" r="3" fill="#BA7517"/>
      <line x1="17" y1="17" x2="17" y2="20" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="17" y1="30" x2="17" y2="33" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="9" y1="25" x2="12" y2="25" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22" y1="25" x2="25" y2="25" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="17" y1="1" x2="1" y2="12" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="17" y1="1" x2="33" y2="12" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <div class="nav-wordmark">Domi<span>vault</span></div>
  </a>
  <div class="nav-right">
    <button class="mark-all" onclick="markAllRead()">Mark all as read</button>
    <div class="navAvatar" id="navAvatar" onclick="goToProfile()">J</div>
  </div>
</nav>

<div class="main-layout">
  <div class="content">

    <!-- TABS -->
    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab active" onclick="setTab(this,'all')">All <span class="tab-badge" id="allBadge">0</span></button>
        <button class="tab" onclick="setTab(this,'messages')">Messages <span class="tab-badge" id="msgBadge">0</span></button>
        <button class="tab" onclick="setTab(this,'listings')">Listings</button>
        <button class="tab" onclick="setTab(this,'viewings')">Viewings</button>
        <button class="tab" onclick="setTab(this,'system')">System</button>
      </div>
    </div>

    <!-- NOTIFICATION LIST -->
    <div class="notif-list" id="notifList"></div>

  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-btn" onclick="window.location='domivault-homepage.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </button>
  <button class="bnav-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="bnav-btn" onclick="window.location='domivault-saved-listings.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    <span>Saved</span>
  </button>
  <button class="bnav-btn" onclick="window.location='domivault-messaging.html'" style="position:relative;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <div class="bnav-badge">2</div>
    <span>Messages</span>
  </button>
  <button class="bnav-btn" onclick="window.location='domivault-tenant-profile.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </button>
</nav>

<script>
const API_URL = 'https://domivault-backend-production.up.railway.app';
let NOTIFICATIONS = [];

function getToken() {
  return localStorage.getItem('dv_token');
}

async function fetchNotifications() {
  const token = getToken();
  if (!token) return;
  try {
    const res = await fetch(API_URL + '/api/notifications', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (Array.isArray(data)) {
      NOTIFICATIONS = data.map(function(n) {
        return {
          id: n._id,
          tab: n.type.includes('message') ? 'messages' : 
               n.type.includes('listing') || n.type.includes('price') ? 'listings' :
               n.type.includes('viewing') || n.type.includes('inspection') ? 'viewings' : 'system',
          unread: !n.read,
          date: getDateLabel(n.createdAt),
          icon: getIcon(n.type),
          iconClass: getIconClass(n.type),
          title: n.title,
          desc: n.message,
          prop: n.property ? n.property.title : null,
          propImg: n.property && n.property.images && n.property.images.length > 0 ? n.property.images[0] : null,
          propPrice: null,
          time: getTimeAgo(n.createdAt),
          actions: getActions(n),
        };
      });
    }
  } catch (err) {
    console.error('Failed to fetch notifications:', err);
  }

  // Update tab badge counts with real data
  const allBadge = document.getElementById('allBadge');
  const msgBadge = document.getElementById('msgBadge');
  if (allBadge) allBadge.textContent = NOTIFICATIONS.length;
  if (msgBadge) msgBadge.textContent = NOTIFICATIONS.filter(function(n) { return n.tab === 'messages'; }).length;

  renderNotifs();
}

function getDateLabel(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff <= 7) return 'This week';
  return 'Earlier';
}

function getTimeAgo(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + ' minutes ago';
  if (diff < 86400) return Math.floor(diff/3600) + ' hours ago';
  return Math.floor(diff/86400) + ' days ago';
}

function getIcon(type) {
  const icons = {
    'new_message': '💬',
    'new_enquiry': '💬',
    'listing_approved': '✅',
    'listing_live': '🏠',
    'listing_rejected': '❌',
    'inspection_scheduled': '📅',
    'viewing_request': '📅',
    'viewing_confirmed': '✅',
    'price_drop': '💰',
    'system': '🔔',
  };
  return icons[type] || '🔔';
}

function getIconClass(type) {
  if (type.includes('message') || type.includes('enquiry')) return 'ni-msg';
  if (type.includes('listing') || type.includes('price')) return 'ni-listing';
  if (type.includes('viewing') || type.includes('inspection')) return 'ni-viewing';
  if (type.includes('approved') || type.includes('live')) return 'ni-check';
  return 'ni-system';
}

function getActions(n) {
  if (n.type === 'new_message' || n.type === 'new_enquiry') {
    return [{label:'Reply', cls:'na-primary', fn:"window.location=(localStorage.getItem('dv_user') && JSON.parse(localStorage.getItem('dv_user')).role === 'landlord' ? 'domivault-landlord-messaging.html' : 'domivault-messaging.html')"}, {label:'Dismiss', cls:'na-secondary', fn:"markRead('" + n._id + "')"}];
  }
  if (n.type === 'listing_live' || n.type === 'listing_approved') {
    return [{label:'View listing', cls:'na-primary', fn:"window.location='domivault-landlord-dashboard.html'"}];
  }
  return [{label:'Dismiss', cls:'na-secondary', fn:"markRead('" + n._id + "')"}];
}

async function markRead(id) {
  const token = getToken();
  if (!token) return;
  try {
    await fetch(API_URL + '/api/notifications/' + id + '/read', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    NOTIFICATIONS = NOTIFICATIONS.map(function(n) {
      if (n.id === id) n.unread = false;
      return n;
    });
    renderNotifs();
  } catch (err) {
    console.error('Failed to mark as read:', err);
  }
}

async function markAllRead() {
  const token = getToken();
  if (!token) return;
  try {
    await fetch(API_URL + '/api/notifications/read-all', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    NOTIFICATIONS.forEach(function(n) { n.unread = false; });
    document.getElementById('allBadge').style.display = 'none';
    document.getElementById('msgBadge').style.display = 'none';
    renderNotifs();
  } catch (err) {
    console.error('Failed to mark all as read:', err);
  }
}

fetchNotifications();

// Role-aware UI init
(function() {
  const u = localStorage.getItem('dv_user');
  const user = u ? JSON.parse(u) : null;
  if (!user) return;

  // Set avatar
  const av = document.getElementById('navAvatar');
  if (av) av.textContent = user.name.charAt(0).toUpperCase();

  // Fix logo link based on role
  const logo = document.getElementById('logoLink');
  if (logo) {
    if (user.role === 'landlord') logo.href = 'domivault-landlord-dashboard.html';
    else if (user.role === 'admin') logo.href = 'domivault-admin-panel.html';
    else logo.href = 'domivault-homepage.html';
  }

  // Set bottom nav based on role
  const nav = document.getElementById('bottomNav');
  if (!nav) return;

  if (user.role === 'landlord') {
    nav.innerHTML = `
      <button class="bnav-btn" onclick="window.location='domivault-landlord-dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="bnav-btn" onclick="window.location='domivault-property-submission.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Listings</span>
      </button>
      <button class="bnav-btn" onclick="window.location='domivault-landlord-messaging.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Messages</span>
      </button>
      <button class="bnav-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Alerts</span>
      </button>`;
  } else {
    nav.innerHTML = `
      <button class="bnav-btn" onclick="window.location='domivault-homepage.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Home</span>
      </button>
      <button class="bnav-btn" onclick="window.location='domivault-saved-listings.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Saved</span>
      </button>
      <button class="bnav-btn" onclick="window.location='domivault-messaging.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Messages</span>
      </button>
      <button class="bnav-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Alerts</span>
      </button>
      <button class="bnav-btn" onclick="window.location='domivault-tenant-profile.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>`;
  }
})();

function goToProfile() {
  const u = localStorage.getItem('dv_user');
  const user = u ? JSON.parse(u) : null;
  if (!user) return;
  if (user.role === 'landlord') window.location = 'domivault-landlord-dashboard.html';
  else window.location = 'domivault-tenant-profile.html';
}

let activeTab = 'all';
let dismissed = new Set();

function setTab(btn, tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = tab;
  renderNotifs();
}

// markAllRead handled by API version above

function dismissNotif(id) {
  markRead(id);
}

function renderNotifs() {
  const list = document.getElementById('notifList');
  let notifs = NOTIFICATIONS.filter(n => !dismissed.has(n.id));
  if (activeTab !== 'all') notifs = notifs.filter(n => n.tab === activeTab);

  if (notifs.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="ei">🔔</div>
        <div class="et">All caught up!</div>
        <div class="es">No notifications here. We'll let you know when something needs your attention.</div>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  notifs.forEach(n => {
    if (!groups[n.date]) groups[n.date] = [];
    groups[n.date].push(n);
  });

  list.innerHTML = Object.entries(groups).map(([date, items]) => `
    <div class="date-label">${date}</div>
    ${items.map(n => `
      <div class="notif-item ${n.unread ? 'unread' : ''}" id="notif-${n.id}">
        <div class="notif-icon-wrap ${n.iconClass}">${n.icon}</div>
        <div class="notif-body">
          <div class="notif-meta">
            ${n.prop ? `<span class="notif-prop">${n.prop}</span>` : ''}
          </div>
          <div class="notif-title">${n.title}</div>
          <div class="notif-desc">${n.desc}</div>
          ${n.propImg ? `
            <div class="notif-prop-preview" onclick="${n.actions?.[0]?.fn || ''}">
              <div class="npp-img"><img src="${n.propImg}" alt="Property" loading="lazy"/></div>
              <div>
                <div class="npp-name">${n.prop}</div>
                <div class="npp-price">${n.propPrice || ''}</div>
              </div>
            </div>` : ''}
          ${n.actions ? `
            <div class="notif-actions">
              ${n.actions.map(a => `<button class="na-btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('')}
            </div>` : ''}
          <div class="notif-time">${n.time}</div>
        </div>
        <div class="notif-right">
          ${n.unread ? '<div class="unread-dot"></div>' : ''}
        </div>
      </div>
    `).join('')}
  `).join('');
}

renderNotifs();
</script>
</body>
</html>
