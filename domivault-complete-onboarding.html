<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Domivault - Onboarding</title>

  <style>
    :root {
      --bg: #0b0f14;
      --card: #121821;
      --text: #e8eef6;
      --muted: #9fb0c3;
      --primary: #4da3ff;
      --border: #1f2a38;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #18202b;
    }

    .btn-primary {
      background: var(--primary);
      border: none;
      color: #fff;
    }

    .divider {
      text-align: center;
      margin: 16px 0;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      body {
        height: auto;
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Welcome to Domivault</h1>
      <p>Secure your digital identity and assets.</p>

      <button class="btn btn-primary">Continue with Email</button>
      <button class="btn">Continue with Phone</button>

      <div class="divider">or</div>

      <button class="btn">Continue with Google</button>
      <button class="btn">Continue with Apple</button>
    </div>
  </div>
</body>
</html>
