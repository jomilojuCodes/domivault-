<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saved Listings — Domivault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a1628;--navy-mid:#132040;--navy-light:#1c2f52;
  --gold:#BA7517;--gold-light:#EF9F27;
  --stone:#888780;--white:#fff;--success:#2ecc71;--error:#e05252;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
  --r:12px;--rs:8px;--t:.25s ease;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--navy);color:var(--white);overflow-x:hidden;padding-bottom:80px;}

/* NAV */
.topnav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 5%;background:rgba(10,22,40,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(186,117,23,.15);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo svg{width:26px;height:30px;flex-shrink:0;}
.nav-wordmark{font-family:var(--serif);font-size:1.25rem;font-weight:700;color:var(--white);}
.nav-wordmark span{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.iBtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);position:relative;}
.iBtn svg{width:17px;height:17px;}
.nBadge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--navy);}
.navAvatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--navy-light));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--navy);cursor:pointer;border:2px solid rgba(186,117,23,.3);}

/* LAYOUT */
.main-layout{display:flex;max-width:1100px;margin:0 auto;}
.sidebar{display:none;width:240px;flex-shrink:0;background:var(--navy-mid);border-right:1px solid rgba(186,117,23,.12);padding:1.5rem 1rem;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:0;}
.sb-btn{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-radius:var(--rs);background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;font-family:var(--sans);font-size:13px;transition:all .2s;text-align:left;width:100%;}
.sb-btn:hover{background:rgba(255,255,255,.05);color:var(--white);}
.sb-btn.active{background:rgba(186,117,23,.1);color:var(--gold);font-weight:500;}
.sb-btn svg{width:17px;height:17px;flex-shrink:0;}
.content{flex:1;min-width:0;padding:1.75rem 5%;}

/* HEADER */
.page-head{margin-bottom:1.5rem;}
.page-title{font-family:var(--serif);font-size:clamp(1.5rem,4vw,2.2rem);font-weight:700;margin-bottom:.4rem;}
.page-sub{font-size:13px;color:rgba(255,255,255,.4);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.toolbar-left{display:flex;gap:7px;flex-wrap:wrap;}
.filter-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:var(--sans);transition:all var(--t);}
.filter-pill.active{background:rgba(186,117,23,.15);border-color:rgba(186,117,23,.45);color:var(--gold-light);}
.sort-select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);border-radius:100px;padding:6px 14px;font-size:12px;font-family:var(--sans);cursor:pointer;outline:none;}

/* RESULTS COUNT */
.results-count{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:1rem;}

/* GRID */
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
.listing-card{background:rgba(255,255,255,.04);border:1px solid rgba(186,117,23,.15);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .3s;}
.listing-card:hover{border-color:var(--gold);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.3);}
.card-img{position:relative;height:195px;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.88);transition:transform .5s;}
.listing-card:hover .card-img img{transform:scale(1.06);}
.verified-badge{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;background:rgba(10,22,40,.85);backdrop-filter:blur(8px);border:1px solid rgba(186,117,23,.5);color:var(--gold-light);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:100px;}
.vdot{width:5px;height:5px;border-radius:50%;background:var(--gold-light);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.save-btn{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(10,22,40,.8);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gold);font-size:14px;transition:all var(--t);}
.save-btn:hover{background:rgba(224,82,82,.2);color:var(--error);}
.inspected-tag{position:absolute;bottom:10px;right:10px;background:rgba(46,204,113,.85);color:white;font-size:9px;font-weight:600;padding:2px 8px;border-radius:100px;}
.saved-date-tag{position:absolute;bottom:10px;left:10px;background:rgba(10,22,40,.8);color:rgba(255,255,255,.6);font-size:9px;padding:2px 8px;border-radius:100px;}
.card-info{padding:1rem;}
.card-type{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.card-name{font-family:var(--serif);font-size:1.05rem;font-weight:700;margin-bottom:4px;line-height:1.2;}
.card-loc{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.card-specs{display:flex;gap:10px;margin-bottom:8px;}
.card-spec{font-size:11px;color:rgba(255,255,255,.38);}
.card-landlord{display:flex;align-items:center;gap:7px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);margin-bottom:8px;}
.ll-avatar{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--navy-mid));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--navy);}
.ll-name{font-size:11px;color:rgba(255,255,255,.45);}
.ll-rating{margin-left:auto;font-size:10px;color:var(--gold);}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-price{font-family:var(--serif);font-size:1.1rem;color:var(--gold);font-weight:700;}
.card-price-note{font-size:9px;color:rgba(255,255,255,.25);}
.card-cta{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background var(--t);}
.card-cta:hover{background:var(--gold-light);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:5rem 2rem;}
.ei{font-size:4rem;margin-bottom:1.25rem;}
.et{font-family:var(--serif);font-size:1.5rem;font-weight:700;margin-bottom:.6rem;}
.es{font-size:14px;color:rgba(255,255,255,.4);line-height:1.7;max-width:380px;margin:0 auto 1.5rem;}
.empty-cta{display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:var(--navy);border:none;border-radius:var(--rs);padding:.75rem 1.75rem;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:background var(--t);}
.empty-cta:hover{background:var(--gold-light);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;padding:.7rem 0 1rem;background:rgba(10,22,40,.97);backdrop-filter:blur(14px);border-top:1px solid rgba(186,117,23,.15);}
.bnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:rgba(255,255,255,.3);font-family:var(--sans);transition:color .2s;position:relative;}
.bnav-btn.active{color:var(--gold);}
.bnav-btn svg{width:20px;height:20px;}
.bnav-btn span{font-size:10px;font-weight:500;}
.bnav-badge{position:absolute;top:-3px;right:-4px;width:15px;height:15px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--navy);}

@media(min-width:860px){body{padding-bottom:0;}.bottom-nav{display:none;}.sidebar{display:block;}.content{padding:2rem 3%;}}
@media(max-width:500px){.listings-grid{grid-template-columns:1fr;}}


.dv-seal:hover{filter:drop-shadow(0 3px 12px rgba(186,117,23,0.7));}

.dv-seal{position:absolute;bottom:8px;right:8px;z-index:3;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <a class="nav-logo" href="domivault-homepage.html">
    <svg viewBox="0 0 34 38" fill="none">
      <polygon points="17,1 33,12 33,37 1,37 1,12" fill="white"/>
      <circle cx="17" cy="25" r="8" fill="none" stroke="#BA7517" stroke-width="2.1"/>
      <circle cx="17" cy="25" r="3" fill="#BA7517"/>
      <line x1="17" y1="17" x2="17" y2="20" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="17" y1="30" x2="17" y2="33" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="9" y1="25" x2="12" y2="25" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22" y1="25" x2="25" y2="25" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="17" y1="1" x2="1" y2="12" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="17" y1="1" x2="33" y2="12" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <div class="nav-wordmark">Domi<span>vault</span></div>
  </a>
  <div class="nav-right">
    <button class="iBtn" aria-label="Notifications" onclick="window.location='domivault-notifications.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="nBadge">3</div>
    </button>
    <div class="navAvatar" onclick="window.location='domivault-tenant-profile.html'">J</div>
  </div>
</nav>

<div class="main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div style="display:flex;flex-direction:column;gap:4px;">
      <button class="sb-btn" onclick="window.location='domivault-homepage.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Home
      </button>
      <button class="sb-btn" onclick="window.location='domivault-listing-detail.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <button class="sb-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Saved
      </button>
      <button class="sb-btn" onclick="window.location='domivault-messaging.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
      </button>
      <button class="sb-btn" onclick="window.location='domivault-tenant-profile.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </button>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <div class="page-head">
      <div class="page-title">Saved listings</div>
      <div class="page-sub" id="pageSubtext">6 verified properties you've saved</div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="filter-pill active" onclick="setFilter(this,'all')">All</button>
        <button class="filter-pill" onclick="setFilter(this,'Lekki')">Lekki</button>
        <button class="filter-pill" onclick="setFilter(this,'Ikoyi')">Ikoyi</button>
        <button class="filter-pill" onclick="setFilter(this,'Victoria Island')">Victoria Island</button>
        <button class="filter-pill" onclick="setFilter(this,'Ajah')">Ajah</button>
        <button class="filter-pill" onclick="setFilter(this,'Yaba')">Yaba</button>
      </div>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="recent">Recently saved</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="beds">Most bedrooms</option>
      </select>
    </div>

    <div class="results-count" id="resultsCount"></div>

    <div class="listings-grid" id="listingsGrid"></div>

  </main>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-btn" onclick="window.location='domivault-homepage.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </button>
  <button class="bnav-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="bnav-btn active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    <span>Saved</span>
  </button>
  <button class="bnav-btn" onclick="window.location='domivault-messaging.html'" style="position:relative;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <div class="bnav-badge">2</div>
    <span>Messages</span>
  </button>
  <button class="bnav-btn" onclick="window.location='domivault-tenant-profile.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </button>
</nav>

<script>
const API_URL = 'https://domivault-backend-production.up.railway.app';
let SAVED = [];
let activeArea = 'all';

function getToken() {
  return localStorage.getItem('dv_token');
}

async function fetchSavedListings() {
  const token = getToken();
  if (!token) {
    window.location = 'domivault-complete-onboarding.html';
    return;
  }
  try {
    const res = await fetch(API_URL + '/api/saved', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (Array.isArray(data)) {
      SAVED = data.map(function(s) {
        const p = s.property;
        return {
          id: p._id,
          type: 'For Rent',
          name: p.title,
          location: p.location.area + ', Lagos',
          area: p.location.area,
          price: '₦' + p.price.toLocaleString('en-NG') + '/yr',
          priceVal: p.price,
          img: p.images && p.images.length > 0 ? p.images[0] : 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600&q=75',
          beds: p.bedrooms,
          baths: p.bathrooms,
          size: p.size ? p.size + 'm²' : 'N/A',
          inspected: p.isInspected,
          landlord: p.landlord ? p.landlord.name : 'Landlord',
          landlordInit: p.landlord ? p.landlord.name.charAt(0) : 'L',
          rating: '5.0 ★',
          savedDate: new Date(s.createdAt).toLocaleDateString('en-NG', {day:'numeric',month:'short'})
        };
      });
    }
  } catch (err) {
    console.error('Failed to fetch saved listings:', err);
  }
  render();
}

function setFilter(btn, area) {
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeArea = area;
  render();
}

async function unsave(e, id) {
  e.stopPropagation();
  const token = getToken();
  if (!token) return;
  try {
    await fetch(API_URL + '/api/saved/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    SAVED = SAVED.filter(s => s.id !== id);
    render();
  } catch (err) {
    console.error('Failed to unsave:', err);
  }
}

function render() {
  let items = (activeArea === 'all' ? [...SAVED] : SAVED.filter(s => s.area === activeArea)).filter(s => s.inspected);

  const sort = document.getElementById('sortSelect').value;
  if (sort === 'price-low') items.sort((a,b) => a.priceVal - b.priceVal);
  if (sort === 'price-high') items.sort((a,b) => b.priceVal - a.priceVal);
  if (sort === 'beds') items.sort((a,b) => b.beds - a.beds);

  document.getElementById('pageSubtext').textContent = SAVED.length + ' verified ' + (SAVED.length === 1 ? 'property' : 'properties') + " you've saved";
  document.getElementById('resultsCount').textContent = items.length + ' listing' + (items.length !== 1 ? 's' : '') + (activeArea !== 'all' ? ' in ' + activeArea : '');

  const grid = document.getElementById('listingsGrid');

  if (SAVED.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="ei">🤍</div><div class="et">No saved listings yet</div><div class="es">Tap the heart icon on any listing to save it here for quick access later.</div><button class="empty-cta" onclick="window.location='domivault-homepage.html'">Browse listings →</button></div>';
    return;
  }

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="ei">🔍</div><div class="et">No saved listings in ' + activeArea + '</div><div class="es">Try a different area filter or browse more listings.</div><button class="empty-cta" onclick="window.location='domivault-homepage.html'">Browse listings →</button></div>';
    return;
  }

  grid.innerHTML = items.map(function(l) {
    return '<div class="listing-card" onclick="window.location='domivault-listing-detail.html?id=' + l.id + ''">' +
      '<div class="card-img">' +
      '<img src="' + l.img + '" alt="' + l.name + '" loading="lazy"/>' +
      '<div class="verified-badge"><div class="vdot"></div> Verified</div>' +
      '<button class="save-btn" onclick="unsave(event,'' + l.id + '')">❤️</button>' +
      '<div class="saved-date-tag">Saved ' + l.savedDate + '</div>' +
      '</div>' +
      '<div class="card-info">' +
      '<div class="card-type">' + l.type + '</div>' +
      '<div class="card-name">' + l.name + '</div>' +
      '<div class="card-loc">' + l.location + '</div>' +
      '<div class="card-specs"><div class="card-spec">' + l.beds + ' bed</div><div class="card-spec">' + l.baths + ' bath</div><div class="card-spec">' + l.size + '</div></div>' +
      '<div class="card-landlord"><div class="ll-avatar">' + l.landlordInit + '</div><div class="ll-name">' + l.landlord + '</div><div class="ll-rating">' + l.rating + '</div></div>' +
      '<div class="card-footer"><div><div class="card-price">' + l.price + '</div><div class="card-price-note">per year</div></div>' +
      '<button class="card-cta" onclick="event.stopPropagation();window.location='domivault-listing-detail.html?id=' + l.id + ''">View →</button></div>' +
      '</div></div>';
  }).join('');
}

fetchSavedListings();
</script>
</body>
</html>
